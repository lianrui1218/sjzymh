    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* Arco Design 科技蓝色系 */
            --primary-color: #165DFF;
            --primary-hover: #4080FF;
            --primary-active: #0E42D2;
            --primary-light: #E8F3FF;
            --success-color: #00B42A;
            --success-light: #E8FFEA;
            --warning-color: #FF7D00;
            --warning-light: #FFF7E8;
            --danger-color: #F53F3F;
            --danger-light: #FFECE8;
            --text-primary: #1D2129;
            --text-secondary: #4E5969;
            --text-light: #86909C;
            --bg-primary: #ffffff;
            --bg-secondary: #F2F3F5;
            --bg-tertiary: #E5E6EB;
            --border-color: #E5E6EB;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 12px rgba(0,0,0,0.1);
            --radius-sm: 2px;
            --radius-md: 4px;
            --radius-lg: 8px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        /* 顶部导航栏 */
        .navbar {
            background: var(--primary-color);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }
        
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .navbar-logo {
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .navbar-logo img {
            height: 36px;
            width: auto;
        }
        
        .navbar-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        .navbar-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .user-avatar:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .user-menu {
            position: relative;
        }
        
        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            min-width: 160px;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s;
            z-index: 1000;
        }
        
        .user-menu:hover .user-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            text-decoration: none;
            transition: background 0.2s;
            cursor: pointer;
        }
        
        .user-dropdown-item:hover {
            background: var(--bg-secondary);
        }
        
        .user-dropdown-item.danger {
            color: var(--danger-color);
        }
        
        .user-dropdown-divider {
            height: 1px;
            background: var(--border-color);
            margin: 4px 0;
        }
        
        .login-btn {
            padding: 6px 16px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: var(--radius-md);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .login-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .logged-out .user-avatar,
        .logged-out .user-menu {
            display: none;
        }
        
        .logged-in .login-btn {
            display: none;
        }
        
        /* 主内容区域 */
        .main-content {
            margin-top: 64px;
            min-height: calc(100vh - 64px);
            display: flex;
        }
        
        /* 左侧导航栏 */
        .sidebar {
            width: 240px;
            background: white;
            border-right: 1px solid var(--border-color);
            padding: 24px 0;
            position: fixed;
            left: 0;
            top: 64px;
            bottom: 0;
            overflow-y: auto;
        }
        
        .sidebar-menu {
            list-style: none;
        }
        
        .menu-item {
            margin-bottom: 4px;
        }
        
        .menu-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        
        .menu-link:hover {
            background: var(--bg-secondary);
            color: var(--primary-color);
        }
        
        .menu-link.active {
            background: var(--primary-light);
            color: var(--primary-color);
            border-left-color: var(--primary-color);
        }
        
        .menu-icon {
            width: 16px;
            height: 16px;
        }
        
        /* 右侧内容区域 */
        .content-area {
            flex: 1;
            margin-left: 240px;
            padding: 24px 40px;
            min-height: calc(100vh - 64px);
        }
        
        /* 页面标题 */
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .page-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--primary-color);
            border-radius: 2px;
        }
        
        /* 操作按钮区域 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-hover);
        }
        
        .btn-secondary {
            background: white;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        
        .btn-secondary:hover {
            color: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .btn-danger {
            background: white;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }
        
        .btn-danger:hover {
            background: var(--danger-light);
        }
        
        /* 数据表格 */
        .data-table {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 24px;
        }
        
        .data-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,
        .data-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .data-table th {
            background: var(--bg-secondary);
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .data-table td {
            font-size: 14px;
            color: var(--text-primary);
        }
        
        .data-table tbody tr:hover td {
            background: var(--bg-secondary);
        }
        
        .data-table tbody tr:last-child td {
            border-bottom: none;
        }
        
        /* 表格操作按钮 */
        .table-actions {
            display: flex;
            gap: 8px;
        }
        
        .table-btn {
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .table-btn.edit {
            background: var(--primary-light);
            color: var(--primary-color);
        }
        
        .table-btn.edit:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .table-btn.delete {
            background: var(--danger-light);
            color: var(--danger-color);
        }
        
        .table-btn.delete:hover {
            background: var(--danger-color);
            color: white;
        }
        
        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: var(--radius-lg);
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-light);
            border-radius: var(--radius-md);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: 60vh;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1);
        }
        
        .form-textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--text-primary);
            resize: vertical;
            min-height: 100px;
            transition: all 0.2s;
        }
        
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1);
        }
        
        .form-select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--text-primary);
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .form-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1);
        }
        
        .form-file {
            width: 100%;
            padding: 8px;
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-md);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .form-file:hover {
            border-color: var(--primary-color);
            background: var(--primary-light);
        }
        
        .form-file input[type="file"] {
            display: none;
        }
        
        .file-label {
            display: block;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        /* 状态标签 */
        .status-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-tag.important {
            background: var(--danger-light);
            color: var(--danger-color);
        }
        
        .status-tag.normal {
            background: var(--primary-light);
            color: var(--primary-color);
        }
        
        .status-tag.update {
            background: var(--success-light);
            color: var(--success-color);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            
            .content-area {
                margin-left: 200px;
                padding: 20px;
            }
            
            .navbar {
                padding: 0 20px;
            }
            
            .navbar-title {
                font-size: 16px;
            }
            
            .page-title {
                font-size: 20px;
            }
            
            .action-bar {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            
            .action-buttons {
                width: 100%;
                justify-content: space-between;
            }
            
            .data-table th,
            .data-table td {
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body class="logged-in">
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="navbar-logo">
                <img src="https://www.cecic.com.cn/images/logo.png" alt="中国能建" onerror="this.style.display='none'">
            </div>
            <span class="navbar-title">易普力数据资产门户 - 管理后台</span>
        </div>
        <div class="navbar-user">
            <div class="user-menu">
                <div class="user-avatar">连</div>
                <div class="user-dropdown">
                    <div class="user-dropdown-item">
                        <svg class="icon" width="16" height="16"><use href="#icon-user"/></svg>
                        个人中心
                    </div>
                    <div class="user-dropdown-divider"></div>
                    <div class="user-dropdown-item danger" onclick="toggleLogin()">
                        <svg class="icon" width="16" height="16"><use href="#icon-logout"/></svg>

                    </div>
                </div>
            </div>
            <button class="login-btn" onclick="toggleLogin()">登录</button>

    <!-- 主内容区域 -->

                <li class="menu-item">

                    </a>
                </li>
            </ul>
        </aside>
        
        <!-- 右侧内容区域 -->
        <div class="content-area">
            <!-- 通知公告管理模块 -->
            <div id="notifications-module" class="module-content">

                <div class="action-bar">

                <div class="data-table">
                    <table>

                                <th>ID</th>

                                <th>类型</th>
                                <th>发布部门</th>

                                <th>操作</th>
                            </tr>
                        </thead>

            <!-- 数据管理标准规范模块 -->
            <div id="standards-module" class="module-content" style="display: none;">
                <h1 class="page-title">数据管理标准规范</h1>
                
                <div class="action-bar">
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="openAddStandardModal()">
                            <svg class="icon" width="16" height="16"><use href="#icon-upload"/></svg>

                    </div>
                </div>
                
                <div class="data-table">
                    <table>
                        <thead>

                                <th>ID</th>
                                <th>文件名称</th>
                                <th>文件类型</th>
                                <th>上传时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>

                        </tbody>
                    </table>

    </main>
    
    <!-- 添加通知公告弹窗 -->
    <div id="add-notification-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">添加通知公告</h3>
                <button class="modal-close" onclick="closeModal('add-notification-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-notification-form">
                    <div class="form-group">
                        <label class="form-label">标题</label>
                        <input type="text" class="form-input" id="notification-title" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">类型</label>
                        <select class="form-select" id="notification-type" required>
                            <option value="important">重要</option>
                            <option value="normal">通知</option>
                            <option value="update">更新</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">发布部门</label>
                        <input type="text" class="form-input" id="notification-department" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">内容</label>
                        <textarea class="form-textarea" id="notification-content" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('add-notification-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitAddNotification()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 编辑通知公告弹窗 -->
    <div id="edit-notification-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">编辑通知公告</h3>
                <button class="modal-close" onclick="closeModal('edit-notification-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-notification-form">
                    <input type="hidden" id="edit-notification-id">
                    <div class="form-group">
                        <label class="form-label">标题</label>
                        <input type="text" class="form-input" id="edit-notification-title" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">类型</label>
                        <select class="form-select" id="edit-notification-type" required>
                            <option value="important">重要</option>
                            <option value="normal">通知</option>
                            <option value="update">更新</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">发布部门</label>
                        <input type="text" class="form-input" id="edit-notification-department" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">内容</label>
                        <textarea class="form-textarea" id="edit-notification-content" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('edit-notification-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitEditNotification()">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 添加标准规范弹窗 -->
    <div id="add-standard-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">上传标准规范</h3>
                <button class="modal-close" onclick="closeModal('add-standard-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-standard-form">
                    <div class="form-group">
                        <label class="form-label">文件名称</label>
                        <input type="text" class="form-input" id="standard-name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">文件上传</label>
                        <div class="form-file">
                            <input type="file" id="standard-file" accept=".pdf,.doc,.docx,.xlsx,.xls" required>
                            <label for="standard-file" class="file-label">
                                <svg class="icon" width="24" height="24"><use href="#icon-upload"/></svg>
                                <br>
                                点击或拖拽文件到此处上传
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('add-standard-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitAddStandard()">上传</button>
            </div>
        </div>
    </div>
    
    <!-- 编辑标准规范弹窗 -->
    <div id="edit-standard-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">编辑标准规范</h3>
                <button class="modal-close" onclick="closeModal('edit-standard-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-standard-form">
                    <input type="hidden" id="edit-standard-id">
                    <div class="form-group">
                        <label class="form-label">文件名称</label>
                        <input type="text" class="form-input" id="edit-standard-name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">文件上传（可选）</label>
                        <div class="form-file">
                            <input type="file" id="edit-standard-file" accept=".pdf,.doc,.docx,.xlsx,.xls">
                            <label for="edit-standard-file" class="file-label">
                                <svg class="icon" width="24" height="24"><use href="#icon-upload"/></svg>
                                <br>
                                点击或拖拽文件到此处上传（留空则保持原文件）
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('edit-standard-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitEditStandard()">保存</button>
            </div>
        </div>
    </div>
    
    <script>
        // 模拟数据
        let notifications = [
            { id: 1, title: '关于数据资产门户系统升级维护的通知', type: 'important', department: '信息技术部', content: '系统将于近期进行升级维护，请各位用户提前做好准备。', date: '2026-03-15' },
            { id: 2, title: '数据资产管理规范培训通知', type: 'normal', department: '数据管理部', content: '将于下周举办数据资产管理规范培训，请相关人员准时参加。', date: '2026-03-14' },
            { id: 3, title: '新增生产运营类数据资产上架公告', type: 'update', department: '生产运营部', content: '新增一批生产运营类数据资产已上架，欢迎大家申请使用。', date: '2026-03-13' }
        ];
        
        let standards = [
            { id: 1, name: '数据资产管理规范', type: 'pdf', date: '2026-03-10', file: '规范文件1.pdf' },
            { id: 2, name: '数据安全管理办法', type: 'doc', date: '2026-03-08', file: '安全管理办法.docx' },
            { id: 3, name: '数据质量评估标准', type: 'xlsx', date: '2026-03-05', file: '质量评估标准.xlsx' }
        ];
        
        // 显示模块
        function showModule(moduleName) {
            // 隐藏所有模块
            document.querySelectorAll('.module-content').forEach(module => {
                module.style.display = 'none';
            });
            
            // 显示选中的模块
            document.getElementById(moduleName + '-module').style.display = 'block';
            
            // 更新导航栏状态
            document.querySelectorAll('.menu-link').forEach(link => {
                link.classList.remove('active');
            });
            document.querySelector(`a[href="#${moduleName}"]`).classList.add('active');
            
            // 刷新数据
            if (moduleName === 'notifications') {
                renderNotifications();
            } else if (moduleName === 'standards') {
                renderStandards();
            }
        }
        
        // 渲染通知列表
        function renderNotifications() {
            const tbody = document.getElementById('notifications-table-body');
            tbody.innerHTML = '';
            
            notifications.forEach(notification => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${notification.id}</td>
                    <td>${notification.title}</td>
                    <td><span class="status-tag ${notification.type}">${notification.type === 'important' ? '重要' : notification.type === 'normal' ? '通知' : '更新'}</span></td>
                    <td>${notification.department}</td>
                    <td>${notification.date}</td>
                    <td>
                        <div class="table-actions">
                            <button class="table-btn edit" onclick="openEditNotificationModal(${notification.id})"><svg class="icon" width="12" height="12"><use href="#icon-edit"/></svg> 编辑</button>
                            <button class="table-btn delete" onclick="deleteNotification(${notification.id})"><svg class="icon" width="12" height="12"><use href="#icon-delete"/></svg> 删除</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // 渲染标准规范列表
        function renderStandards() {
            const tbody = document.getElementById('standards-table-body');
            tbody.innerHTML = '';
            
            standards.forEach(standard => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${standard.id}</td>
                    <td>${standard.name}</td>
                    <td>${standard.type.toUpperCase()}</td>
                    <td>${standard.date}</td>
                    <td>
                        <div class="table-actions">
                            <button class="table-btn edit" onclick="openEditStandardModal(${standard.id})"><svg class="icon" width="12" height="12"><use href="#icon-edit"/></svg> 编辑</button>
                            <button class="table-btn delete" onclick="deleteStandard(${standard.id})"><svg class="icon" width="12" height="12"><use href="#icon-delete"/></svg> 删除</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // 打开添加通知弹窗
        function openAddNotificationModal() {
            document.getElementById('add-notification-modal').classList.add('active');
        }
        
        // 打开编辑通知弹窗
        function openEditNotificationModal(id) {
            const notification = notifications.find(n => n.id === id);
            if (notification) {
                document.getElementById('edit-notification-id').value = notification.id;
                document.getElementById('edit-notification-title').value = notification.title;
                document.getElementById('edit-notification-type').value = notification.type;
                document.getElementById('edit-notification-department').value = notification.department;
                document.getElementById('edit-notification-content').value = notification.content;
                document.getElementById('edit-notification-modal').classList.add('active');
            }
        }
        
        // 提交添加通知
        function submitAddNotification() {
            const title = document.getElementById('notification-title').value;
            const type = document.getElementById('notification-type').value;
            const department = document.getElementById('notification-department').value;
            const content = document.getElementById('notification-content').value;
            
            const newNotification = {
                id: notifications.length + 1,
                title,
                type,
                department,
                content,
                date: new Date().toISOString().split('T')[0]
            };
            
            notifications.push(newNotification);
            renderNotifications();
            closeModal('add-notification-modal');
            
            // 清空表单
            document.getElementById('add-notification-form').reset();
        }
        
        // 提交编辑通知
        function submitEditNotification() {
            const id = parseInt(document.getElementById('edit-notification-id').value);
            const title = document.getElementById('edit-notification-title').value;
            const type = document.getElementById('edit-notification-type').value;
            const department = document.getElementById('edit-notification-department').value;
            const content = document.getElementById('edit-notification-content').value;
            
            const index = notifications.findIndex(n => n.id === id);
            if (index !== -1) {
                notifications[index] = {
                    ...notifications[index],
                    title,
                    type,
                    department,
                    content
                };
                renderNotifications();
                closeModal('edit-notification-modal');
            }
        }
        
        // 删除通知
        function deleteNotification(id) {
            if (confirm('确定要删除这条通知吗？')) {
                notifications = notifications.filter(n => n.id !== id);
                renderNotifications();
            }
        }
        
        // 打开添加标准规范弹窗
        function openAddStandardModal() {
            document.getElementById('add-standard-modal').classList.add('active');
        }
        
        // 打开编辑标准规范弹窗
        function openEditStandardModal(id) {
            const standard = standards.find(s => s.id === id);
            if (standard) {
                document.getElementById('edit-standard-id').value = standard.id;
                document.getElementById('edit-standard-name').value = standard.name;
                document.getElementById('edit-standard-modal').classList.add('active');
            }
        }
        
        // 提交添加标准规范
        function submitAddStandard() {
            const name = document.getElementById('standard-name').value;
            const fileInput = document.getElementById('standard-file');
            const file = fileInput.files[0];
            
            if (file) {
                const fileType = file.name.split('.').pop().toLowerCase();
                const newStandard = {
                    id: standards.length + 1,
                    name,
                    type: fileType,
                    date: new Date().toISOString().split('T')[0],
                    file: file.name
                };
                
                standards.push(newStandard);
                renderStandards();
                closeModal('add-standard-modal');
                
                // 清空表单
                document.getElementById('add-standard-form').reset();
            }
        }
        
        // 提交编辑标准规范
        function submitEditStandard() {
            const id = parseInt(document.getElementById('edit-standard-id').value);
            const name = document.getElementById('edit-standard-name').value;
            const fileInput = document.getElementById('edit-standard-file');
            const file = fileInput.files[0];
            
            const index = standards.findIndex(s => s.id === id);
            if (index !== -1) {
                const updatedStandard = {
                    ...standards[index],
                    name
                };
                
                if (file) {
                    updatedStandard.type = file.name.split('.').pop().toLowerCase();
                    updatedStandard.file = file.name;
                }
                
                standards[index] = updatedStandard;
                renderStandards();
                closeModal('edit-standard-modal');
            }
        }
        
        // 删除标准规范
        function deleteStandard(id) {
            if (confirm('确定要删除这个标准规范吗？')) {
                standards = standards.filter(s => s.id !== id);
                renderStandards();
            }
        }
        
        // 关闭弹窗
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // 登录/退出功能
        function toggleLogin() {
            const navbar = document.querySelector('.navbar');
            if (navbar.classList.contains('logged-in')) {
                navbar.classList.remove('logged-in');
                navbar.classList.add('logged-out');
                window.location.href = 'index.html';
            } else {
                navbar.classList.remove('logged-out');
                navbar.classList.add('logged-in');
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderNotifications();
        });
    </script>
</body>
</html>
